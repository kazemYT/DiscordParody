<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Parody</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Discord Parody</h1>

      <section class="card" id="auth-card">
        <h2>Аккаунт</h2>
        <p class="hint">Сначала зарегистрируйся, потом можно создавать серверы и писать сообщения.</p>
        <div class="fields">
          <input id="username" placeholder="Логин" />
          <input id="password" type="password" placeholder="Пароль" />
          <div class="actions">
            <button id="register-btn">Регистрация</button>
            <button id="login-btn" class="secondary">Вход</button>
          </div>
          <p id="auth-status"></p>
        </div>
      </section>

      <section class="card">
        <h2>Серверы</h2>
        <div class="actions">
          <input id="server-name" placeholder="Название сервера" />
          <button id="create-server-btn">Создать сервер</button>
        </div>
        <ul id="server-list"></ul>
      </section>

      <section class="card">
        <h2>Чат</h2>
        <p id="chat-meta">Выбери сервер для чата.</p>
        <div class="actions">
          <input id="message-text" placeholder="Введите сообщение" />
          <button id="send-message-btn">Отправить</button>
        </div>
        <ul id="messages"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
